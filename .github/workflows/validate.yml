name: Validate YAML

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        with:
          config_file: .yamllint.yml
          strict: false
