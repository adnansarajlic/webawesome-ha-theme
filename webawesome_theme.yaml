WebAwesome:
  # ----------------------------------------------------------------------------
  #  WEB AWESOME THEME
  #  Inspiration: https://webawesome.com/docs/color-palettes
  #  By: Atlas
  # ----------------------------------------------------------------------------

  modes:
    light:
      # Bakgrunder
      primary-background-color: "#f8fafc"  # Slate 50
      secondary-background-color: "#f1f5f9" # Slate 100
      card-background-color: "#ffffff"     # Vit
      
      # Text
      primary-text-color: "#0f172a"        # Slate 900
      secondary-text-color: "#64748b"      # Slate 500
      text-primary-color: "#ffffff"        # Text på primärfärg
      
      # 2026 Semantic Form Variables (WebAwesome Migration)
      ha-color-form-background: "#ffffff"
      ha-color-form-background-hover: "#f8fafc"
      ha-color-form-background-disabled: "#e2e8f0"
      
      # Linjer och Gränser
      divider-color: "rgba(15, 23, 42, 0.08)"
      
      # Shadow (Soft modern shadow)
      ha-card-box-shadow: "0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1)"

    dark:
      # Bakgrunder
      primary-background-color: "#0f172a"  # Slate 900
      secondary-background-color: "#020617" # Slate 950
      card-background-color: "#1e293b"     # Slate 800
      
      # Text
      primary-text-color: "#f8fafc"        # Slate 50
      secondary-text-color: "#94a3b8"      # Slate 400
      text-primary-color: "#ffffff"        # Text på primärfärg
      
      # 2026 Semantic Form Variables
      ha-color-form-background: "#334155"  # Slate 700
      ha-color-form-background-hover: "#475569" # Slate 600
      ha-color-form-background-disabled: "#1e293b"
      
      # Linjer och Gränser
      divider-color: "rgba(248, 250, 252, 0.08)"
      
      # Shadow (Subtle dark shadow)
      ha-card-box-shadow: "0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.3)"

  # ----------------------------------------------------------------------------
  #  GLOBAL VARIABLES (Gäller både Ljus och Mörk)
  # ----------------------------------------------------------------------------
  
  # Brand Colors (WebAwesome Sky Palette)
  primary-color: "#0ea5e9"       # Brand Blue
  accent-color: "#f59e0b"        # Amber
  
  # Semantic WebAwesome Colors (Använd dessa i dina kort!)
  wa-success: "#10b981"          # Emerald
  wa-warning: "#f59e0b"          # Amber
  wa-danger: "#ef4444"           # Red
  wa-info: "#0ea5e9"             # Sky Blue
  wa-neutral: "#64748b"          # Slate
  wa-purple: "#8b5cf6"           # Violet
  
  # State Colors
  state-icon-color: "var(--secondary-text-color)"
  state-icon-active-color: "var(--primary-color)"
  state-light-active-color: "var(--wa-warning)"
  state-switch-active-color: "var(--wa-success)"
  state-binary_sensor-active-color: "var(--wa-info)"
  state-climate-heating-color: "var(--wa-danger)"
  state-climate-cooling-color: "var(--wa-info)"
  
  # Typografi
  ha-font-family-body: "'Inter', system-ui, -apple-system, sans-serif"
  ha-font-family-heading: "'Inter', system-ui, -apple-system, sans-serif"
  
  # Hörn & Radie (WebAwesome använder lite mjukare hörn än default HA)
  ha-card-border-radius: "12px"
  ha-dialog-border-radius: "16px"
  
  # ----------------------------------------------------------------------------
  #  CARD-MOD STYLING (Kräver thomasloven/lovelace-card-mod)
  # ----------------------------------------------------------------------------
  card-mod-theme: WebAwesome
  card-mod-card-yaml: |
    .: |
      /* Smidig övergång när musen hovrar över alla vanliga kort */
      ha-card {
        transition: box-shadow 0.2s ease, transform 0.2s ease !important;
      }
      ha-card:hover {
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1) !important;
        transform: translateY(-1px);
      }
      
      /* Specifikt för Mushroom Chips-kort: Rundare hörn och extra padding */
      :host(mushroom-chips-card) ha-card {
        border-radius: 24px !important;
        padding-left: 12px !important;
        padding-bottom: 12px !important;
      }
      
      /* REUSABLE WEBAWESOME CHIP PRESETS */
      /* Genom att definiera dessa här kan vem som helst använda dem i sina kort utan komplex färgkod! */
      :host {
        --wa-bg-success: color-mix(in srgb, var(--wa-success) 20%, transparent);
        --wa-bg-warning: color-mix(in srgb, var(--wa-warning) 30%, transparent);
        --wa-bg-danger: color-mix(in srgb, var(--wa-danger) 20%, transparent);
        --wa-bg-info: color-mix(in srgb, var(--wa-info) 20%, transparent);
        --wa-bg-purple: color-mix(in srgb, var(--wa-purple) 20%, transparent);
        --wa-bg-neutral: color-mix(in srgb, var(--wa-neutral) 20%, transparent);
      }
      
      /* GLOBAL ANIMATIONS */
      /* Dessa kan nu anropas från vilket kort som helst i hela systemet! */
      @keyframes wa-wobbling {
        0% { transform: rotate(-25deg); }
        100% { transform: rotate(25deg); }
      }
      @keyframes wa-steam {
        0% { transform: translateY(0px) scale(1); opacity: 1; }
        50% { transform: translateY(-1px) scale(1.05); opacity: 0.9; }
        100% { transform: translateY(-2px) scale(1.1); opacity: 0.8; }
      }
      @keyframes wa-door {
        0% { clip-path: inset(0 0 0 0); }
        25%  { clip-path: polygon(0 0, 100% 0, 100% 100%, 68% 100%, 69% 73%, 32% 73%, 31% 100%, 0 100%); }
        50%  { clip-path: polygon(0 0, 100% 0, 100% 100%, 68% 100%, 69% 61%, 32% 61%, 31% 100%, 0 100%); }
        75% { clip-path: polygon(0 0, 100% 0, 100% 100%, 68% 100%, 69% 48%, 32% 48%, 31% 100%, 0 100%); }
      }
    "ha-switch":
      $: |
        /* WebAwesome-inspirerad focus ring för switchar */
        .mdc-switch:focus-within .mdc-switch__track {
          outline: 2px solid var(--primary-color);
          outline-offset: 2px;
        }
    "ha-input":
      $: |
        /* Anpassning för 2026 WebAwesome inputs */
        .mdc-text-field {
          border-radius: 8px !important;
        }
        .mdc-text-field:focus-within {
          outline: 2px solid var(--primary-color) !important;
          outline-offset: -1px;
        }
